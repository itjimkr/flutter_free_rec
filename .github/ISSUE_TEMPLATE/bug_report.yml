name: Bug report
description: Report a reproducible problem in Rec.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - iOS
        - Android
        - Flutter UI
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version or commit
      placeholder: "Example: 1.0.0+1 or commit SHA"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Rec
        2. Choose ...
        3. Press ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove private recordings, personal data, and sensitive paths before attaching logs.
